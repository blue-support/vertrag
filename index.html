<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weiterleitung...</title>

<!-- Automatische Weiterleitung nach 1 Sekunde -->
<meta http-equiv="refresh" content="1; url=https://docs.google.com/document/d/1iJPIjyY6o8iYfllQg2FBeuvGSXgqJ1ahRoRMJJv-kEo/edit?usp=sharing">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
}

/* Scrollbar unsichtbar */
body {
    overflow: hidden;
    scrollbar-width: none;
}
body::-webkit-scrollbar {
    width: 0;
    background: transparent;
}

/* Hintergrund */
body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at top, #1a1a1a, #000);
    color: #fff;
    text-align: center;
}

body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: linear-gradient(120deg, #111, #222, #111);
    filter: blur(60px);
    z-index: -1;
}

.container {
    max-width: 600px;
}

h1 {
    font-size: 2rem;
    margin-bottom: 20px;
}

p {
    color: #ccc;
}

a {
    color: #fff;
    text-decoration: underline;
}
</style>

<script>
    // JS Weiterleitung (sofort)
    setTimeout(function(){
        window.location.href = "https://docs.google.com/document/d/1iJPIjyY6o8iYfllQg2FBeuvGSXgqJ1ahRoRMJJv-kEo/edit?usp=sharing";
    }, 500);
</script>

</head>

<body>

<div class="container">
    <h1>Du wirst weitergeleitet...</h1>
    <p>Falls nichts passiert, klicke <a href="https://docs.google.com/document/d/1iJPIjyY6o8iYfllQg2FBeuvGSXgqJ1ahRoRMJJv-kEo/edit?usp=sharing">hier</a>.</p>
</div>

</body>
</html>
